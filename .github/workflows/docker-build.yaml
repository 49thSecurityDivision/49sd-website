name: Build and Publish Docker Image

# This triggers the action whenever you push to the 'main' branch
on:
  push:
    branches: ['master']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Grants permissions needed to push to the GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Grabs your code from the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Logs into GHCR using the built-in GitHub token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Builds the Dockerfile and pushes it to the registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Make sure your username/repo is entirely lowercase!
          tags: ghcr.io/${{ github.repository_owner }}/49sdwebsite:latest
